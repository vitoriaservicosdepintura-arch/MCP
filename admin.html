<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - MCP Construções</title>
    <link href="https://fonts.googleapis.com/css?family=Poppins:400,500,600,700,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --gold: #c8a96e;
            --dark: #111;
            --bg: #f4f4f4;
            --text: #333;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
        }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #111, #333);
        }

        .login-box {
            background: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 20px;
            color: var(--dark);
        }

        .login-box input {
            width: calc(100% - 24px);
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-box button:hover {
            background: #a8893e;
            color: #fff;
        }

        .error-msg {
            color: red;
            font-size: 12px;
            margin-bottom: 10px;
            display: none;
        }

        /* --- ADMIN PANEL --- */
        #admin-panel {
            display: none;
            display: flex; /* we'll handle this in JS */
            min-height: 100vh;
        }
        
        /* hidden by default */
        .hidden { display: none !important; }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: var(--dark);
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        .sidebar-header h3 { margin: 0; color: var(--gold); }

        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-menu li {
            border-bottom: 1px solid #222;
        }

        .nav-menu a {
            display: block;
            padding: 15px 20px;
            color: #ccc;
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-menu a:hover, .nav-menu a.active {
            background: var(--gold);
            color: var(--dark);
        }
        
        .nav-menu a i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }

        .logout-btn {
            margin-top: auto;
            padding: 15px;
            background: #d32f2f;
            color: white;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .header-bar h2 { margin: 0; }

        .btn-save {
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-save:hover {
            background: #a8893e;
            color: #fff;
        }

        /* Forms */
        .section-panel {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            display: none;
        }

        .section-panel.active { display: block; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--dark); }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        .form-group textarea { min-height: 100px; resize: vertical; }

        .image-preview {
            max-width: 200px;
            max-height: 150px;
            display: block;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px dashed #ccc;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 15px 25px;
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
            opacity: 0;
            visibility: hidden;
            z-index: 1000;
        }
        .notification.show { opacity: 1; visibility: visible; }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-box">
            <h2><span style="color:var(--gold)">MCP</span> Admin</h2>
            <div class="error-msg" id="login-error">Credenciais inválidas!</div>
            <input type="email" id="login-email" placeholder="E-mail" required>
            <input type="password" id="login-pass" placeholder="Senha" required>
            <button onclick="realizarLogin()">Entrar</button>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="admin-panel" class="hidden">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Painel Admin</h3>
            </div>
            <ul class="nav-menu">
                <li><a href="#" class="nav-link active" data-target="geral"><i class="fas fa-cog"></i> Config. Gerais (Logo)</a></li>
                <li><a href="#" class="nav-link" data-target="inicio"><i class="fas fa-home"></i> Início</a></li>
                <li><a href="#" class="nav-link" data-target="servicos"><i class="fas fa-hammer"></i> Serviços</a></li>
                <li><a href="#" class="nav-link" data-target="sobre"><i class="fas fa-info-circle"></i> Sobre</a></li>
                <li><a href="#" class="nav-link" data-target="contato"><i class="fas fa-envelope"></i> Contato</a></li>
            </ul>
            <a href="#" class="logout-btn" onclick="realizarLogout()"><i class="fas fa-sign-out-alt"></i> Sair</a>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="header-bar">
                <h2 id="current-section-title">Configurações Gerais</h2>
                <div>
                    <a href="index.html" target="_blank" class="btn-save" style="background:#555; color:white; text-decoration:none; margin-right:10px;">Ver Site</a>
                    <button class="btn-save" onclick="salvarAlteracoes()"><i class="fas fa-save"></i> Salvar Alterações</button>
                </div>
            </div>

            <!-- GERAL / LOGO -->
            <div id="geral" class="section-panel active">
                <h3>Configurações Gerais</h3>
                <div class="form-group">
                    <label>Logo Texto Principal</label>
                    <input type="text" id="logo_texto_1" placeholder="Ex: MCP">
                </div>
                <div class="form-group">
                    <label>Logo Texto Destaque (Dourado)</label>
                    <input type="text" id="logo_texto_2" placeholder="Ex: Construções">
                </div>
                <div class="form-group">
                    <label>Logo Subtítulo</label>
                    <input type="text" id="logo_sub" placeholder="Ex: Engenharia e Obras">
                </div>
            </div>

            <!-- INÍCIO -->
            <div id="inicio" class="section-panel">
                <h3>Seção Início (Banner)</h3>
                <div class="form-group">
                    <label>Título Slide 1</label>
                    <input type="text" id="slide1_tit1" placeholder="Ex: Construção Civil">
                    <input type="text" id="slide1_tit2" placeholder="Ex: de Alto Padrão (Dourado)" style="margin-top:10px;">
                </div>
                <div class="form-group">
                    <label>Subtítulo Slide 1</label>
                    <input type="text" id="slide1_sub" placeholder="Ex: Mais de 15 anos construindo...">
                </div>
                <div class="form-group">
                    <label>Imagem Slide 1 (URL)</label>
                    <input type="text" id="slide1_img" placeholder="https://..." oninput="previewImg('slide1_img', 'prev_slide1')">
                    <img id="prev_slide1" class="image-preview">
                </div>
                <hr>
                <div class="form-group">
                    <label>Texto Animado (Estatísticas)</label>
                    <input type="text" id="stats_text" placeholder="Ex: NA MCP CONSTRUÇÕES, CADA DETALHE...">
                </div>
            </div>

            <!-- SERVIÇOS -->
            <div id="servicos" class="section-panel">
                <h3>Seção Serviços</h3>
                <div class="form-group">
                    <label>Título Bloco 1</label>
                    <input type="text" id="serv_tit1" placeholder="Construção Residencial">
                </div>
                <div class="form-group">
                    <label>Texto Bloco 1</label>
                    <textarea id="serv_txt1"></textarea>
                </div>
                <div class="form-group">
                    <label>Imagem Bloco 1 (URL)</label>
                    <input type="text" id="serv_img1" oninput="previewImg('serv_img1', 'prev_serv1')">
                    <img id="prev_serv1" class="image-preview">
                </div>
            </div>

            <!-- SOBRE -->
            <div id="sobre" class="section-panel">
                <h3>Seção Sobre Nós</h3>
                <div class="form-group">
                    <label>Título</label>
                    <input type="text" id="sobre_tit" placeholder="Sobre Nós">
                </div>
                <div class="form-group">
                    <label>Texto Completo (Habilita HTML para quebras de linha/listas)</label>
                    <textarea id="sobre_txt"></textarea>
                </div>
                <div class="form-group">
                    <label>Imagem Sobre Nós (URL)</label>
                    <input type="text" id="sobre_img" oninput="previewImg('sobre_img', 'prev_sobre')">
                    <img id="prev_sobre" class="image-preview">
                </div>
            </div>

            <!-- CONTATO -->
            <div id="contato" class="section-panel">
                <h3>Informações de Contato</h3>
                <div class="form-group">
                    <label>Endereço</label>
                    <input type="text" id="contato_end" placeholder="Lisboa — Portugal">
                </div>
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="text" id="contato_tel" placeholder="+351 934 627 192">
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="text" id="contato_email" placeholder="contato@mcpconstrucoes.pt">
                </div>
                <div class="form-group">
                    <label>Horário</label>
                    <input type="text" id="contato_hr" placeholder="Seg–Sex: 08h às 18h">
                </div>
            </div>

        </div>
    </div>

    <div class="notification" id="notif">Alterações salvas com sucesso!</div>

    <script>
        // Crendenciais requisitadas
        const LOGIN_CORRETO = "vitoriaservicosdepintura@gmail.com";
        const SENHA_CORRETA = "10203040";

        // Check login on load
        if(localStorage.getItem('mcp_admin_logged') === 'true') {
            mostrarApp();
        }

        function realizarLogin() {
            const email = document.getElementById('login-email').value.toLowerCase();
            const pass = document.getElementById('login-pass').value;

            if(email === LOGIN_CORRETO && pass === SENHA_CORRETA) {
                localStorage.setItem('mcp_admin_logged', 'true');
                mostrarApp();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function realizarLogout() {
            localStorage.removeItem('mcp_admin_logged');
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        }

        function mostrarApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            carregarDados();
        }

        // Navegação abas
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                // remove active de todos botões e paineis
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
                
                // add no clicado
                link.classList.add('active');
                const target = link.getAttribute('data-target');
                document.getElementById(target).classList.add('active');
                document.getElementById('current-section-title').innerText = link.innerText;
            });
        });

        // Configurações Default (padrão do HTML original)
        const defaultConfig = {
            logo_texto_1: "MCP",
            logo_texto_2: "Construções",
            logo_sub: "Engenharia e Obras",
            
            slide1_tit1: "Construção Civil",
            slide1_tit2: "de Alto Padrão",
            slide1_sub: "Mais de 15 anos construindo o futuro com excelência.",
            slide1_img: "https://images.unsplash.com/photo-1487958449943-2429e8be8625?w=1600&q=80",
            stats_text: "NA MCP CONSTRUÇÕES, CADA DETALHE É IMPORTANTE.",
            
            serv_tit1: "Construção Residencial",
            serv_txt1: "<p style='margin-bottom: 15px;'>A MCP Construções é especializada em obras residenciais de alto padrão...</p>",
            serv_img1: "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=1000&q=80",
            
            sobre_tit: "Sobre Nós",
            sobre_txt: "<p>A MCP Construções nasceu da paixão por transformar projetos em realidade...</p>",
            sobre_img: "https://images.unsplash.com/photo-1503387762-592deb58ef4e?w=1000&q=80",
            
            contato_end: "Lisboa — Portugal",
            contato_tel: "+351 934 627 192",
            contato_email: "contato@mcpconstrucoes.pt",
            contato_hr: "Seg–Sex: 08h às 18h"
        };

        function carregarDados() {
            const savedData = JSON.parse(localStorage.getItem('mcp_site_data')) || defaultConfig;
            
            // Popula os campos
            for (const key in savedData) {
                const el = document.getElementById(key);
                if(el) {
                    el.value = savedData[key];
                    // dispara trigger pra imagem preview
                    if(key.includes('_img')) previewImg(key, 'prev_'+key.split('_')[0]);
                }
            }
        }

        function salvarAlteracoes() {
            const savedData = JSON.parse(localStorage.getItem('mcp_site_data')) || defaultConfig;
            
            // Atualiza baseado nos campos da tela
            for (const key in savedData) {
                const el = document.getElementById(key);
                if(el) {
                    savedData[key] = el.value;
                }
            }

            localStorage.setItem('mcp_site_data', JSON.stringify(savedData));
            
            // Show notification
            const notif = document.getElementById('notif');
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        function previewImg(inputId, imgId) {
            const val = document.getElementById(inputId).value;
            const imgEl = document.getElementById(imgId)
            if(imgEl){
                imgEl.src = val;
                imgEl.style.display = val ? 'block' : 'none';
            }
        }
    </script>
</body>
</html>
